<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Orders | Gadget Finds</title>

    <link rel="stylesheet" href="CSS/admin-dashboard.css">

    <style>

        *{
            font-family:Arial,Helvetica,sans-serif;
            box-sizing:border-box;
        }

        body{
            margin:0;
            display:flex;
            background:#f5f5f5;
        }

        .sidebar{

            width:220px;
            background:#111827;
            min-height:100vh;
            color:white;
            padding:20px;

        }

        .sidebar h2{

            text-align:center;
            margin-bottom:40px;

        }

        .sidebar a{

            display:block;
            color:white;
            text-decoration:none;
            padding:12px;
            border-radius:8px;
            margin-bottom:10px;

        }

        .sidebar a:hover{

            background:#2563eb;

        }

        .sidebar .active{

            background:#2563eb;

        }

        #logoutBtn{

            width:100%;
            margin-top:40px;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#dc2626;
            color:white;
            cursor:pointer;

        }

        .main{

            flex:1;
            padding:30px;

        }

        .card{

            background:white;
            border-radius:10px;
            padding:20px;
            box-shadow:0 3px 10px rgba(0,0,0,.08);

        }

        table{

            width:100%;
            border-collapse:collapse;

        }

        th{

            background:#2563eb;
            color:white;
            padding:12px;

        }

        td{

            padding:12px;
            border-bottom:1px solid #ddd;
            text-align:center;

        }

        select{

            padding:8px;
            border-radius:6px;

        }

        button{

            padding:8px 12px;
            margin:2px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            color:white;

        }

        .verify{

            background:#16a34a;

        }

        .reject{

            background:#dc2626;

        }

        .delete{

            background:#111827;

        }

    </style>

</head>

<body>

<div class="sidebar">

    <h2>Gadget Finds</h2>

    <a href="admin-dashboard.html">

        Products

    </a>

    <a href="admin-orders.html"
       class="active">

        Orders

    </a>

    <button id="logoutBtn">

        Logout

    </button>

</div>

<div class="main">

    <div class="card">

        <h1>

            Order Management

        </h1>

        <table>

            <thead>

            <tr>

                <th>Tracking</th>

                <th>Customer</th>

                <th>Phone</th>

                <th>M-Pesa Code</th>

                <th>Amount</th>

                <th>Payment</th>

                <th>Shipment</th>

                <th>Actions</th>

            </tr>

            </thead>

            <tbody id="ordersTable">

            </tbody>

        </table>

    </div>

</div>

<script src="Js/admin-orders.js"></script>

</body>

</html>
