<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard | Gadget Finds</title>

    <link rel="stylesheet" href="CSS/index.css">

</head>

<body>

<header class="page-header">

    <h1>🛠 Gadget Finds Admin Dashboard</h1>

    <p>Manage products from one place.</p>

</header>

<main class="admin-container">

    <!-- Add Product -->

    <section class="admin-form">

        <h2>Add New Product</h2>

        <input
        id="name"
        placeholder="Product Name">

        <input
        id="price"
        type="number"
        placeholder="Price (KES)">

        <input
        id="image"
        placeholder="Image Path">

        <input
        id="category"
        placeholder="Category">

        <input
        id="rating"
        type="number"
        step="0.1"
        placeholder="Rating">

        <input
        id="delivery"
        placeholder="Delivery">

        <button
        id="addProduct"
        class="primary-btn">

            ➕ Add Product

        </button>

    </section>

    <!-- Products -->

    <section class="admin-products">

        <div class="admin-header">

            <h2>Products</h2>

            <button
            class="secondary-btn"
            onclick="location.reload()">

                🔄 Refresh

            </button>

        </div>

        <div id="products">

            Loading products...

        </div>

    </section>

</main>

<script src="Js/admin.js"></script>

</body>

</html>
