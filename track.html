<!DOCTYPE html>
<html>

<head>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="tracking">

<h1>Track Order</h1>

<div id="trackingCard">

</div>
<div class="tracking-card">

    <h2>Package Tracking</h2>

    <p>
        Tracking ID:
        <span id="trackingId"></span>
    </p>

    <p>
        Order ID:
        <span id="orderId"></span>
    </p>

    <p>
        Amount:
        KES
        <span id="amount"></span>
    </p>

    <p>
        Status:
        <span id="status"></span>
    </p>

</div>
<script>
    const params =
new URLSearchParams(
window.location.search
);

const trackingId =
params.get("tracking");

fetch(
`http://localhost:5000/api/orders/track/${trackingId}`
)

.then(res=>res.json())

.then(order=>{

document
.getElementById("trackingId")
.textContent =
order.tracking_id;

document
.getElementById("orderId")
.textContent =
order.order_id;

document
.getElementById("amount")
.textContent =
order.amount;

document
.getElementById("status")
.textContent =
order.shipment_status;

});
</script>
<script src="track.js"></script>

</body>

</html>
