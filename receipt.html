<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Receipt | Gadget Finds</title>

    <link rel="stylesheet" href="CSS/index.css">

</head>

<body>

    <header class="page-header">

        <h1>✅ Order Successful</h1>

        <p>Thank you for shopping with Gadget Finds.</p>

    </header>

    <main class="receipt-container">

        <section class="receipt-card">

            <div id="receiptInfo">

                <!-- receipt.js loads everything here -->

            </div>

            <hr>

            <div class="receipt-actions">

                <button
                    class="primary-btn"
                    onclick="window.location='track.html'">

                    📦 Track Order

                </button>

                <button
                    class="secondary-btn"
                    onclick="window.location='orders.html'">

                    📋 My Orders

                </button>

                <button
                    class="secondary-btn"
                    onclick="window.location='index.html'">

                    🛍 Continue Shopping

                </button>

            </div>

<div class="receipt-message">

    <p>
        Your payment has been received successfully.
    </p>

    <p>
        We are now preparing your order for dispatch.
    </p>

</div>
        </section>
        

    </main>

    <script src="Js/receipt.js"></script>

</body>

</html>
