<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Gadget Finds</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:350px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

p{
    text-align:center;
}

a{
    color:#2563eb;
    text-decoration:none;
}

</style>

</head>
<body>

<div class="container">

<h2>Create Account</h2>

<input
id="name"
type="text"
placeholder="Full Name">

<br><br>

<input
id="email"
type="email"
placeholder="Email">

<br><br>

<input
id="password"
type="password"
placeholder="Password">

<br><br>

<button onclick="registerUser()">

Register

</button>

<p>
Already have an account?
<a href="login.html">
Login
</a>
</p>

</div>

<script>
async function registerUser() {

    const name = document.getElementById("name").value.trim();

    const email = document.getElementById("email").value.trim();

    const password = document.getElementById("password").value;

    if (!name || !email || !password) {

        alert("Please fill in all fields.");

        return;

    }

    try {

        const response = await fetch(

            "http://localhost:5000/api/auth/register",

            {

                method: "POST",

                headers: {

                    "Content-Type": "application/json"

                },

                body: JSON.stringify({

                    name,
                    email,
                    password

                })

            }

        );

        const result = await response.json();

        if (!response.ok) {

            alert(result.message || "Registration failed.");

            return;

        }

        alert("Registration successful!");

        window.location.href = "login.html";

    }

    catch (error) {

        console.error(error);

        alert("Server error.");

    }

}

</script>

</body>
</html>
