<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>My Orders | Gadget Finds</title>

    <link rel="stylesheet" href="CSS/index.css">

</head>

<body>

    <header class="page-header">

        <h1>📋 My Orders</h1>

        <p>Track and manage your purchases.</p>

    </header>

    <main class="orders-container">

        <!-- Summary Cards -->
        <section class="orders-summary">

            <div class="summary-card">

                <h2 id="totalOrders">0</h2>

                <p>Total Orders</p>

            </div>

            <div class="summary-card">

                <h2 id="inTransit">0</h2>

                <p>In Transit</p>

            </div>

            <div class="summary-card">

                <h2 id="delivered">0</h2>

                <p>Delivered</p>

            </div>

        </section>

        <!-- Orders List -->
        <section>

            <div id="ordersList">

                <!-- Loaded by orders.js -->

            </div>

        </section>

        <div class="orders-actions">

            <button
                class="secondary-btn"
                onclick="window.location='index.html'">

                🛍 Continue Shopping

            </button>

        </div>

    </main>

    <script src="Js/orders.js"></script>

</body>

</html>
