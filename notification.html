<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Notifications | Gadget Finds</title>

<link rel="stylesheet" href="CSS/notification.css">

<link
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
rel="stylesheet">

</head>

<body>

<!-- ===========================
NAVBAR
=========================== -->

<nav>

<div class="logo">

<a href="index.html">

Gadget<span>Finds</span>

</a>

</div>

<div class="navActions">

<button id="markAllRead">

<i class="fa-solid fa-check-double"></i>

Mark All Read

</button>

</div>

</nav>

<!-- ===========================
HEADER
=========================== -->

<section class="pageHeader">

<h1>

Notifications

</h1>

<p>

Your recent account activity.

</p>

</section>

<!-- ===========================
FILTERS
=========================== -->

<section class="filters">

<button
class="filter active"
data-filter="all">

All

</button>

<button
class="filter"
data-filter="unread">

Unread

</button>

<button
class="filter"
data-filter="read">

Read

</button>

</section>

<!-- ===========================
NOTIFICATIONS
=========================== -->

<section
id="notificationsList"
class="notificationsList">

</section>

<!-- ===========================
EMPTY STATE
=========================== -->

<div
id="emptyState"
class="emptyState"
style="display:none;">

<i
class="fa-regular fa-bell-slash">

</i>

<h2>

You're all caught up!

</h2>

<p>

No notifications available.

</p>

</div>

BOTTOM NAV
=========================== -->

<i class="fa-solid fa-house"></i>
