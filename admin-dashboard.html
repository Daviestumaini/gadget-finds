<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gadget Finds Admin</title>

    <link rel="stylesheet" href="CSS/admin-dashboard.css">

</head>

<body>

<div class="sidebar">

    <h2>📱 Gadget Finds</h2>

    <button class="nav active">Dashboard</button>

    <button class="nav" id="productsTab">Products</button>

    <button class="nav" id="ordersTab">Orders</button>

    <button class="nav" id="customersTab">Customers</button>

    <button class="nav" id="analyticsTab">Analytics</button>

    <button class="logout" id="logoutBtn">Logout</button>

</div>

<div class="main">

    <header>

        <h1>Admin Dashboard</h1>

        <p id="welcome"></p>

    </header>

    <div class="cards">

        <div class="card">

            <h3>Total Products</h3>

            <h1 id="productCount">0</h1>

        </div>

        <div class="card">

            <h3>Total Orders</h3>

            <h1 id="orderCount">0</h1>

        </div>

        <div class="card">

            <h3>Customers</h3>

            <h1 id="customerCount">0</h1>

        </div>

        <div class="card">

            <h3>Revenue</h3>

            <h1>KES <span id="revenue">0</span></h1>

        </div>

    </div>

    <section class="panel">

        <h2>Products</h2>

        <button id="addProductBtn">

            + Add Product

        </button>

        <table>

            <thead>

                <tr>

                    <th>Image</th>

                    <th>Name</th>

                    <th>Price</th>

                    <th>Category</th>

                    <th>Actions</th>

                </tr>

            </thead>

            <tbody id="productsTable">

            </tbody>

        </table>

    </section>

</div>
<script src="Js/config.js"></script>
<script src="Js/admin-auth.js"></script>
<script src="Js/admin-dashboard.js"></script>

</body>

</html>
